x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:
  acs-grader:
    image: ghcr.io/nxdus/acs-grader:latest
    pull_policy: always
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - app-postgres
      - judge0-server
    <<: *default-logging
    restart: always

  app-postgres:
    image: postgres:16.2
    environment:
      POSTGRES_DB: ${APP_POSTGRES_DB}
      POSTGRES_USER: ${APP_POSTGRES_USER}
      POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD}
    volumes:
      - app-data:/var/lib/postgresql/data/
    <<: *default-logging
    restart: always

  judge0-server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    <<: *default-logging
    restart: always

  judge0-workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    cpus: 2.5
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    <<: *default-logging
    restart: always

  judge0-postgres:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - judge0-data:/var/lib/postgresql/data/
    <<: *default-logging
    restart: always

  judge0-redis:
    image: redis:7.2.4
    command: [
      "bash", "-c",
      'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
    ]
    env_file: judge0.conf
    <<: *default-logging
    restart: always

volumes:
  judge0-data:
  app-data:
